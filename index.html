<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug Admin</title>
<style>
  body{background:#0a0a0a;color:#f5f5f5;font-family:monospace;padding:1rem;}
  h2{color:#FFD700;margin-bottom:1rem;}
  .row{display:flex;gap:.5rem;padding:.4rem 0;border-bottom:1px solid #222;}
  .key{color:#FFD700;min-width:180px;flex-shrink:0;}
  .val{color:#f5f5f5;word-break:break-all;}
  .val.img{max-width:80px;max-height:80px;object-fit:contain;display:block;margin-top:.3rem;}
  .seccion{color:#555;font-size:.75rem;text-transform:uppercase;letter-spacing:2px;margin:1rem 0 .4rem;}
  #status{color:#888;margin-bottom:1rem;font-size:.85rem;}
  .err{color:#e53e3e;}
</style>
</head>
<body>
<h2>🔍 Parámetros del Admin</h2>
<div id="status">Cargando...</div>
<div id="output"></div>
<script>
const URL = "https://script.google.com/macros/s/AKfycbwwnWMDlxiaf6-MUEQcY2eD34VQi3wwVicg0b_40SHi7OT2g2Ylf7jrWDQImbqLbdb9/exec";

async function cargar(accion){
  try{
    const r = await fetch(URL+"?accion="+accion+"&t="+Date.now());
    return await r.json();
  }catch(e){ return {error: e.message}; }
}

function row(k, v){
  const div = document.createElement('div');
  div.className = 'row';
  const isImg = typeof v === 'string' && (v.startsWith('data:image') || v.startsWith('http'));
  div.innerHTML = `<span class="key">${k}</span><span class="val">${
    isImg && v.length > 100
      ? `<img class="val img" src="${v}"><span style="color:#555;font-size:.7rem">(${v.length} chars)</span>`
      : String(v).slice(0, 300)
  }</span>`;
  return div;
}

function seccion(txt){
  const d = document.createElement('div');
  d.className = 'seccion'; d.textContent = '── '+txt+' ──';
  return d;
}

async function init(){
  const out = document.getElementById('output');
  const st  = document.getElementById('status');

  // leerTodo
  st.textContent = 'Llamando leerTodo...';
  const todo = await cargar('leerTodo');
  st.textContent = 'Respuesta recibida ✓';

  // Mostrar keys raíz
  out.appendChild(seccion('Keys raíz de leerTodo'));
  Object.keys(todo).forEach(k => {
    const v = todo[k];
    if(typeof v === 'object' && !Array.isArray(v)){
      out.appendChild(row(k, '[objeto] → ' + Object.keys(v).join(', ')));
    } else if(Array.isArray(v)){
      out.appendChild(row(k, '[array] '+v.length+' items'));
    } else {
      out.appendChild(row(k, v));
    }
  });

  // Si hay config, mostrar sus campos
  const cfg = todo.config || todo.data || null;
  if(cfg && typeof cfg === 'object'){
    out.appendChild(seccion('Campos de config'));
    Object.entries(cfg).forEach(([k,v]) => out.appendChild(row(k, v)));
  }

  // leerConfig por separado
  out.appendChild(seccion('leerConfig directo'));
  const conf = await cargar('leerConfig');
  Object.keys(conf).forEach(k => {
    const v = conf[k];
    if(typeof v === 'object'){
      out.appendChild(row(k+'  [obj]', Object.keys(v).join(', ')));
      Object.entries(v).forEach(([k2,v2]) => out.appendChild(row('  '+k2, v2)));
    } else {
      out.appendChild(row(k, v));
    }
  });
}

init();
</script>
</body>
</html>
