<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Test Móvil - Independiente</title>

  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PWA Test">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 15px;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      overflow: hidden;
      max-width: 420px;
      margin: 0 auto;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 35px 20px 25px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 26px; font-weight: 700; }
    .content { padding: 25px 20px; }
    .status {
      padding: 16px 18px;
      margin: 12px 0;
      border-radius: 12px;
      font-size: 15.5px;
      font-weight: 600;
      text-align: left;
    }
    .ok    { background: #e6f7ee; color: #006d2f; border-left: 5px solid #00c853; }
    .info  { background: #e8f0fe; color: #1a73e8; border-left: 5px solid #4285f4; }

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-install { background: #1a73e8; color: white; }
    .btn-offline { background: #34a853; color: white; }
    .btn-clear   { background: #ea4335; color: white; }

    .interaction-box {
      background: #f8f9fa;
      border: 2px dashed #1a73e8;
      border-radius: 12px;
      padding: 15px;
      margin: 15px 0;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <header>
      <h1>🧪 PWA Test Móvil</h1>
      <p>Versión 100% Independiente</p>
    </header>

    <div class="content">
      <div class="status ok" id="sw-status">✅ Service Worker Activo</div>
      <div class="status info" id="manifest-status">Manifest: Cargando...</div>
      <div class="status info" id="install-status">Prompt de Instalación: Cargando...</div>

      <div class="interaction-box" id="interaction-area">
        <strong>Interactúa aquí para activar el prompt</strong><br>
        <small>Toca los botones de abajo varias veces o haz scroll</small>
      </div>

      <button class="btn-install" onclick="forceInstallPrompt()">📲 Intentar Instalar PWA</button>
      <button class="btn-offline" onclick="testOffline()">🔌 Probar Modo Offline</button>
      <button class="btn-clear" onclick="clearCache()">🗑️ Limpiar Caché y Recargar</button>
    </div>
  </div>

  <script>
    // Service Worker y Manifest
    fetch('manifest.json')
      .then(r => r.json())
      .then(() => {
        document.getElementById('manifest-status').className = 'status ok';
        document.getElementById('manifest-status').textContent = '✅ Manifest cargado correctamente';
      })
      .catch(() => {
        document.getElementById('manifest-status').className = 'status error';
        document.getElementById('manifest-status').textContent = '❌ Error manifest.json';
      });

    let deferredPrompt = null;
    let interactionCount = 0;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-status').className = 'status ok';
      document.getElementById('install-status').innerHTML = `✅ Prompt listo para usar`;
    });

    // Simular interacción del usuario para "engañar" al navegador
    function simulateUserInteraction() {
      interactionCount++;
      document.getElementById('interaction-area').innerHTML = 
        `✅ Interacción detectada (${interactionCount}/8)<br><small>Sigue tocando para activar el prompt</small>`;
      
      if (interactionCount >= 6) {
        document.getElementById('interaction-area').style.borderColor = '#34a853';
        document.getElementById('interaction-area').innerHTML = `✅ Interacciones suficientes.<br>Ahora pulsa "Intentar Instalar PWA"`;
      }
    }

    // Añadir listeners de interacción
    document.addEventListener('click', simulateUserInteraction);
    document.addEventListener('scroll', simulateUserInteraction);

    function forceInstallPrompt() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
      } else {
        alert('Todavía no aparece el prompt.\n\nToca varias veces dentro del recuadro azul o los botones para simular interacción.');
      }
    }

    function testOffline() {
      alert('✅ Activa modo avión y recarga esta página');
    }

    function clearCache() {
      if (confirm('¿Limpiar caché y recargar?')) {
        caches.keys().then(names => {
          Promise.all(names.map(n => caches.delete(n))).then(() => location.reload());
        });
      }
    }
  </script>
</body>
</html>
