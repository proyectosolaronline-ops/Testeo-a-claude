<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Test Móvil - Independiente</title>

  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PWA Test">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 15px;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      overflow: hidden;
      max-width: 420px;
      margin: 0 auto;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 35px 20px 25px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 26px; font-weight: 700; }
    .content { padding: 25px 20px; }
    .status {
      padding: 16px 18px;
      margin: 12px 0;
      border-radius: 12px;
      font-size: 15.5px;
      font-weight: 600;
      text-align: left;
    }
    .ok    { background: #e6f7ee; color: #006d2f; border-left: 5px solid #00c853; }
    .info  { background: #e8f0fe; color: #1a73e8; border-left: 5px solid #4285f4; }

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-install { background: #1a73e8; color: white; }
    .btn-offline { background: #34a853; color: white; }
    .btn-clear   { background: #ea4335; color: white; }

    .interaction-box {
      background: #e8f0fe;
      border: 3px dashed #1a73e8;
      border-radius: 15px;
      padding: 20px;
      margin: 15px 0;
      text-align: center;
      font-size: 15px;
      min-height: 80px;
    }
  </style>
</head>
<body>

  <div class="card">
    <header>
      <h1>🧪 PWA Test Móvil</h1>
      <p>Versión 100% Independiente</p>
    </header>

    <div class="content">
      <div class="status ok">✅ Service Worker Activo</div>
      <div class="status info" id="manifest-status">Manifest: Cargando...</div>
      <div class="status info" id="install-status">Prompt: Esperando interacción...</div>

      <div class="interaction-box" id="interaction-box">
        <strong>Toca aquí varias veces</strong><br>
        <span id="count">Toques: 0 / 12</span>
      </div>

      <button class="btn-install" onclick="forceInstallPrompt()">📲 Intentar Instalar PWA</button>
      <button class="btn-offline" onclick="testOffline()">🔌 Probar Modo Offline</button>
      <button class="btn-clear" onclick="clearCache()">🗑️ Limpiar Caché y Recargar</button>
    </div>
  </div>

  <script>
    let deferredPrompt = null;
    let touchCount = 0;

    // Manifest
    fetch('manifest.json')
      .then(r => r.json())
      .then(() => {
        document.getElementById('manifest-status').className = 'status ok';
        document.getElementById('manifest-status').textContent = '✅ Manifest cargado correctamente';
      })
      .catch(() => {
        document.getElementById('manifest-status').className = 'status error';
        document.getElementById('manifest-status').textContent = '❌ Error al cargar manifest';
      });

    // Detectar cuando Chrome permite el prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-status').className = 'status ok';
      document.getElementById('install-status').innerHTML = `✅ ¡Prompt listo! Pulsa el botón azul`;
    });

    // Contador de toques para simular interacción
    const box = document.getElementById('interaction-box');
    box.addEventListener('click', () => {
      touchCount++;
      document.getElementById('count').textContent = `Toques: ${touchCount} / 12`;
      
      if (touchCount >= 8) {
        box.style.borderColor = '#34a853';
        box.style.background = '#e6f7ee';
        box.innerHTML = `<strong>✅ Suficiente interacción</strong><br>Ahora pulsa "Intentar Instalar PWA"`;
      }
    });

    function forceInstallPrompt() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(result => {
          console.log('Resultado:', result.outcome);
        });
      } else {
        alert('Aún no aparece el prompt.\n\nToca muchas veces dentro del recuadro azul (al menos 8-10 veces) y luego pulsa el botón azul.');
      }
    }

    function testOffline() {
      alert('Activa modo avión y recarga esta página');
    }

    function clearCache() {
      if (confirm('¿Limpiar caché y recargar?')) {
        caches.keys().then(names => {
          Promise.all(names.map(n => caches.delete(n))).then(() => location.reload());
        });
      }
    }
  </script>
</body>
</html>
