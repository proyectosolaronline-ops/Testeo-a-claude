<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Test - Tienda</title>

  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tienda Test">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f8f9fa;
    }
    h1 { color: #1a73e8; }
    .status {
      margin: 20px 0;
      padding: 15px;
      border-radius: 8px;
      font-weight: bold;
    }
    .ok { background: #d4edda; color: #155724; }
    .info { background: #d1ecf1; color: #0c5460; }
    button {
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-primary { background: #1a73e8; color: white; }
  </style>
</head>
<body>

  <h1>🔧 PWA Test Tool</h1>
  <p>Usa esta página para verificar que tu PWA está correctamente configurada.</p>

  <div class="status info" id="sw-status">Service Worker: Cargando...</div>
  <div class="status info" id="manifest-status">Manifest: Cargando...</div>
  <div class="status info" id="install-status">Instalación: Cargando...</div>

  <button class="btn-primary" onclick="testOffline()">Probar Modo Offline</button>
  <button class="btn-primary" onclick="clearCache()">Limpiar Caché y Recargar</button>
  <button class="btn-primary" onclick="showInstallPrompt()">Forzar Prompt de Instalación</button>

  <script>
    // Verificar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => {
          document.getElementById('sw-status').className = 'status ok';
          document.getElementById('sw-status').textContent = `Service Worker: ✅ Activo (Scope: ${reg.scope})`;
        })
        .catch(err => {
          document.getElementById('sw-status').className = 'status';
          document.getElementById('sw-status').innerHTML = `Service Worker: ❌ Error → ${err.message}`;
        });
    } else {
      document.getElementById('sw-status').textContent = 'Service Worker: ❌ No soportado en este navegador';
    }

    // Verificar Manifest
    fetch('manifest.json')
      .then(r => r.json())
      .then(data => {
        const hasScreenshots = data.screenshots && data.screenshots.length >= 2;
        const hasWide = data.screenshots?.some(s => s.form_factor === 'wide');
        const hasNarrow = data.screenshots?.some(s => s.form_factor === 'narrow' || !s.form_factor);

        let msg = `Manifest: ✅ Cargado correctamente<br>`;
        msg += `• ID: ${data.id || 'No definido'}<br>`;
        msg += `• Icons: ${data.icons ? data.icons.length : 0} iconos<br>`;
        msg += `• Screenshots: ${hasScreenshots ? '✅' : '❌'} (${hasWide ? 'wide ✓' : ''} ${hasNarrow ? 'narrow ✓' : ''})`;

        document.getElementById('manifest-status').className = 'status ok';
        document.getElementById('manifest-status').innerHTML = msg;
      })
      .catch(() => {
        document.getElementById('manifest-status').textContent = 'Manifest: ❌ No se pudo cargar (revisa que exista)';
      });
