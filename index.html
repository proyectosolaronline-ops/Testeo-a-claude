<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Test Completo - Index</title>

  <!-- PWA Básico -->
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PWA Test">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">

  <!-- Manifest (apunta a la carpeta principal) -->
  <link rel="manifest" href="../manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f0f2f5, #e8f0fe);
      margin: 0;
      padding: 20px;
      color: #1a1a2e;
      line-height: 1.6;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 28px; }
    .content { padding: 30px 25px; }
    .status {
      padding: 16px;
      margin: 12px 0;
      border-radius: 10px;
      font-weight: 600;
      text-align: left;
    }
    .ok { background: #d4edda; color: #155724; border-left: 5px solid #28a745; }
    .error { background: #f8d7da; color: #721c24; border-left: 5px solid #dc3545; }
    .info { background: #d1ecf1; color: #0c5460; border-left: 5px solid #17a2b8; }
    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-blue { background: #1a73e8; color: white; }
    .btn-red { background: #dc3545; color: white; }
    .btn-gray { background: #6c757d; color: white; }
    .small { font-size: 13px; color: #666; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>🧪 PWA Test Completo</h1>
      <p>Archivo independiente en carpeta separada</p>
    </header>

    <div class="content">
      <div class="status info" id="sw-status">Service Worker: Cargando...</div>
      <div class="status info" id="manifest-status">Manifest: Cargando...</div>
      <div class="status info" id="install-status">Prompt Instalación: Cargando...</div>

      <button class="btn-blue" onclick="testOffline()">🔌 Probar Modo Offline</button>
      <button class="btn-blue" onclick="forceInstallPrompt()">📲 Forzar Prompt de Instalación</button>
      <button class="btn-red" onclick="clearAllCache()">🗑️ Limpiar Caché y Recargar</button>
    </div>
  </div>

  <div class="small">
    Abre DevTools (F12) → Application para ver Service Workers y Cache Storage
  </div>

  <script>
    // Registro del Service Worker (apunta a la carpeta principal)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js')
        .then(reg => {
          document.getElementById('sw-status').className = 'status ok';
          document.getElementById('sw-status').innerHTML = `✅ Service Worker Activo<br><small>Scope: ${reg.scope}</small>`;
        })
        .catch(err => {
          document.getElementById('sw-status').className = 'status error';
          document.getElementById('sw-status').textContent = `❌ Error SW: ${err.message}`;
        });
    } else {
      document.getElementById('sw-status').className = 'status error';
      document.getElementById('sw-status').textContent = '❌ Service Worker no soportado';
    }

    // Verificar Manifest
    fetch('../manifest.json')
      .then(r => r.json())
      .then(m => {
        const hasWide = m.screenshots?.some(s => s.form_factor === 'wide');
        const hasNarrow = m.screenshots?.some(s => !s.form_factor || s.form_factor === 'narrow');

        let msg = `✅ Manifest cargado correctamente<br>`;
        msg += `• ID: ${m.id || 'No definido'}<br>`;
        msg += `• Screenshots: ${hasWide ? 'wide ✓' : 'wide ❌'} | ${hasNarrow ? 'narrow ✓' : 'narrow ❌'}`;

        document.getElementById('manifest-status').className = 'status ok';
        document.getElementById('manifest-status').innerHTML = msg;
      })
      .catch(() => {
        document.getElementById('manifest-status').className = 'status error';
        document.getElementById('manifest-status').textContent = '❌ No se encontró manifest.json (revisa la ruta)';
      });

    // Prompt de instalación
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-status').className = 'status ok';
      document.getElementById('install-status').textContent = '✅ Prompt de instalación disponible';
    });

    function forceInstallPrompt() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
      } else {
        alert('Prompt no disponible.\nPrueba desde un móvil o activa "Update on reload" en DevTools.');
      }
    }

    function testOffline() {
      alert('✅ Ahora ve a DevTools → Application → Service Workers y marca "Offline"\nLuego recarga esta página.');
    }

    function clearAllCache() {
      if (confirm('¿Borrar toda la caché y recargar?')) {
        caches.keys().then(names => {
          Promise.all(names.map(name => caches.delete(name)))
            .then(() => window.location.reload());
        });
      }
    }
  </script>

</body>
</html>
